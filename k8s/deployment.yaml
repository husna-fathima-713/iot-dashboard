apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-dashboard
  labels:
    app: iot-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-dashboard
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: iot-dashboard
    spec:
      containers:
        - name: iot-dashboard
          # DIRECTIVE: Use the version-specific tag we built in Jenkins
          image: iot-dashboard:v2 
          # DIRECTIVE: Prevent K8s from looking at external registries
          imagePullPolicy: IfNotPresent 
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5